  {id:1,c:"Technique",rt:"6 min",t:"Le substrat idéal pour vos tomates en pot",d:"28 mars 2026",img:"https://images.unsplash.com/photo-1592921870583-aeafb0639ffe?w=400&q=75",ex:"La composition exacte du substrat parfait pour des tomates cerises abondantes sur balcon.",full:"<p>Le substrat est la base de tout potager en pot. Les erreurs de substrat sont responsables de 80% des échecs chez les débutants.</p><h3>La composition idéale</h3><p><strong>60% terreau universel de qualité</strong> — pH 6-7. <strong>30% perlite horticole</strong> — aère les racines et évite l'asphyxie, principale cause de mort en pot. <strong>10% compost mûr</strong> si vous en avez.</p><h3>Le test du drainage</h3><p>Versez 1L d'eau dans votre pot. L'eau doit ressortir par les trous en moins de 30 secondes. Sinon, ajoutez de la perlite.</p><h3>À éviter absolument</h3><p>N'utilisez jamais de terre de jardin en pot — elle se compacte et étouffe les racines.</p>"},

function go(p,param){
  page=p;
  document.querySelectorAll('.nl').forEach(b=>b.classList.remove('on'));
  const map={formations:1,engrais:2,guide:3,blog:4,faq:5,materiel:6};
  if(map[p]!=null) document.querySelectorAll('.nl')[map[p]-1]?.classList.add('on');
  const app=document.getElementById('app');
  app.innerHTML=render(p,param);
  setTimeout(()=>init(p),0);
}

function render(p,param){
  switch(p){
    case 'home': return renderHome();
    case 'formations': return renderFormations();
    case 'engrais': return renderEngrais();
    case 'guide': return renderGuide();
    case 'blog': return renderBlog();
    case 'faq': return renderFaq();
    case 'materiel': return renderMateriel();
    case 'dashboard': return renderDash();
    case 'checkout': return renderCheckout(param);
    case 'mission': return renderMission();
    case 'contact': return renderContact();
    case 'cgv': return renderCGV();
    default: return renderHome();
  }
}

let modalEl=null;
function showModal(title,body){
  closeM();
  const bg=document.createElement('div');bg.className='modal-bg';bg.onclick=function(e){if(e.target===this)closeM();};
  bg.innerHTML=`<div class="modal"><div class="modal-h"><div style="font-family:Georgia,serif;font-size:18px;font-weight:700;color:#1E1208;line-height:1.2">${title}</div><button onclick="closeM()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#5C4030;line-height:1">✕</button></div><div class="modal-b">${body}</div></div>`;
  document.body.appendChild(bg);modalEl=bg;setTimeout(()=>{bg.style.opacity='1';},10);
}
function closeM(){if(modalEl){modalEl.remove();modalEl=null;}}

  const chatArea=document.getElementById('chat-area');
  chatArea.innerHTML=`<button class="chat-btn" id="ctb" onclick="toggleChat()" title="Parler à Flora">🌿</button><div class="chat-win" id="cw"><div class="chat-top"><div style="width:28px;height:28px;background:rgba(168,224,144,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px">🌿</div><div><div style="font-size:12px;font-weight:700;color:#fff">Flora — Conseillère PousseLab</div><div style="font-size:10px;color:rgba(255,255,255,.6)">En ligne · Répond rapidement</div></div><button onclick="toggleChat()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;margin-left:auto">✕</button></div><div class="chat-msgs" id="cmsg"><div class="msg bot">Bonjour ! 🌱 Je suis Flora. Balcon, terrasse ou intérieur ? Je vous aide à choisir la formation idéale.</div></div><form onsubmit="sendFlora(event)" class="chat-f"><input class="chat-i" id="ci" placeholder="Votre question…" autocomplete="off"/><button class="chat-s" type="submit">→</button></form></div>`;
